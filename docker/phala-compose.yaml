# Phala Cloud TEE deployment — Bread Coop / sigstack-bot
#
# Build & push YOUR images (linux/amd64 required), then deploy:
#   docker buildx build --platform linux/amd64 -t YOUR_DOCKERHUB/signal-bot-tee:latest -f docker/Dockerfile --push .
#   docker buildx build --platform linux/amd64 -t YOUR_DOCKERHUB/signal-registration-proxy:latest -f docker/Dockerfile.proxy --push .
#   docker buildx build --platform linux/amd64 -t YOUR_DOCKERHUB/signal-whisper-api:latest -f docker/Dockerfile.whisper --push .
#
#   cd deploy/dstack-app-ctqs1
#   phala deploy --cvm-id dstack-app-ctqs1 -c ../../docker/phala-compose.yaml -e phala.env --wait -t tdx.medium

services:
  signal-api:
    image: bbernhard/signal-cli-rest-api@sha256:2399d449123cdad56c4d859277e3b9127e1a00c4d2ab4601c239882609286cf8
    container_name: signal-api
    environment:
      - MODE=normal
      - LOG_LEVEL=info
    ports:
      - "8080:8080"
    volumes:
      - signal-config-v3:/home/.local/share/signal-cli
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  whisper-api:
    image: ${WHISPER_IMAGE}
    platform: linux/amd64
    container_name: whisper-api
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-small}
    volumes:
      - whisper-models:/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    restart: unless-stopped

  signal-bot:
    image: ${SIGNAL_BOT_IMAGE}
    container_name: signal-bot
    environment:
      - SIGNAL__SERVICE_URL=http://signal-api:8080
      - NEAR_AI__API_KEY=${NEAR_AI_API_KEY}
      - NEAR_AI__BASE_URL=${NEAR_AI_BASE_URL:-https://cloud-api.near.ai/v1}
      - NEAR_AI__MODEL=${NEAR_AI_MODEL:-deepseek-ai/DeepSeek-V3.1}
      - NEAR_AI__TIMEOUT=${NEAR_AI_TIMEOUT:-120s}
      - WHISPER__ENABLED=${WHISPER_ENABLED:-true}
      - WHISPER__SERVICE_URL=http://whisper-api:9000
      - WHISPER__MODEL=${WHISPER_MODEL:-small}
      - WHISPER__TIMEOUT=${WHISPER_TIMEOUT:-120s}
      - TRANSLATE_ALL__ENABLED=${TRANSLATE_ALL_ENABLED:-true}
      - TRANSLATE_ALL__MAX_MESSAGES_PER_MINUTE=${TRANSLATE_ALL_MAX_MESSAGES_PER_MINUTE:-30}
      - CONVERSATION__MAX_MESSAGES=${CONVERSATION_MAX_MESSAGES:-50}
      - CONVERSATION__TTL=${CONVERSATION_TTL:-24h}
      - BOT__LOG_LEVEL=${LOG_LEVEL:-info}
      - BOT__SIGNAL_USERNAME=${BOT_SIGNAL_USERNAME:-}
      - BOT__GITHUB_REPO=${BOT_GITHUB_REPO:-https://github.com/BreadchainCoop/sigstack-bot}
      - TOOLS__ENABLED=${TOOLS_ENABLED:-true}
      - TOOLS__WEB_SEARCH__API_KEY=${TOOLS_WEB_SEARCH_API_KEY}
      - PAYMENTS__ENABLED=false
      - DSTACK__SOCKET_PATH=/var/run/dstack.sock
      - GROUP_PREFERENCES__PERSIST=true
      - GROUP_PREFERENCES__STORAGE_PATH=/data/group_prefs.enc
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock:ro
      - group-prefs-data:/data
    depends_on:
      - signal-api
      - whisper-api
    restart: unless-stopped

  signal-registration-proxy:
    image: ${SIGNAL_PROXY_IMAGE}
    container_name: signal-registration-proxy
    environment:
      - SIGNAL__API_URL=http://signal-api:8080
      - REGISTRY__PATH=/data/registry.enc
      - SERVER__LISTEN_ADDR=0.0.0.0
      - SERVER__PORT=8081
      - DSTACK__SOCKET_PATH=/var/run/dstack.sock
      - RATE_LIMIT__GLOBAL_PER_MINUTE=${RATE_LIMIT_GLOBAL_PER_MINUTE:-60}
      - RATE_LIMIT__PER_NUMBER_PER_HOUR=${RATE_LIMIT_PER_NUMBER_PER_HOUR:-10}
      - LOG__LEVEL=${LOG_LEVEL:-info}
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock:ro
      - registry-data:/data
    ports:
      - "8081:8081"
    depends_on:
      - signal-api
    restart: unless-stopped

volumes:
  signal-config-v3:
    driver: local
  registry-data:
    driver: local
  group-prefs-data:
    driver: local
  whisper-models:
    driver: local

version: "3.8"

services:
  signal-api:
    # Pinned to specific digest for TEE attestation integrity
    # To update: docker pull bbernhard/signal-cli-rest-api:latest && docker inspect --format='{{index .RepoDigests 0}}'
    image: bbernhard/signal-cli-rest-api@sha256:2399d449123cdad56c4d859277e3b9127e1a00c4d2ab4601c239882609286cf8
    container_name: signal-api
    environment:
      - MODE=normal
      - AUTO_RECEIVE_SCHEDULE=
      - LOG_LEVEL=info
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock:ro
      - signal-config:/home/.local/share/signal-cli
    # SECURITY: No ports exposed - only accessible within Docker network
    # For initial setup, use: docker exec signal-api curl ...
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  signal-bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: signal-bot
    environment:
      - SIGNAL__SERVICE_URL=http://signal-api:8080
      - SIGNAL__PHONE_NUMBER=${SIGNAL_PHONE}
      - NEAR_AI__API_KEY=${NEAR_AI_API_KEY}
      - NEAR_AI__BASE_URL=${NEAR_AI_BASE_URL:-https://cloud-api.near.ai/v1}
      - NEAR_AI__MODEL=${NEAR_AI_MODEL:-deepseek-ai/DeepSeek-V3.1}
      - NEAR_AI__TIMEOUT=${NEAR_AI_TIMEOUT:-120s}
      - WHISPER__ENABLED=${WHISPER_ENABLED:-true}
      - WHISPER__SERVICE_URL=http://whisper-api:9000
      - WHISPER__MODEL=${WHISPER_MODEL:-small}
      - WHISPER__TIMEOUT=${WHISPER_TIMEOUT:-120s}
      - CONVERSATION__MAX_MESSAGES=${CONVERSATION_MAX_MESSAGES:-50}
      - CONVERSATION__TTL=${CONVERSATION_TTL:-24h}
      - BOT__LOG_LEVEL=${LOG_LEVEL:-info}
      - DSTACK__SOCKET_PATH=/var/run/dstack.sock
      - GROUP_PREFERENCES__PERSIST=${GROUP_PREFERENCES_PERSIST:-true}
      - GROUP_PREFERENCES__STORAGE_PATH=/data/group_prefs.enc
      # Pacto messaging (requires the pacto-bot-api service: --profile pacto)
      - PACTO__ENABLED=${PACTO_ENABLED:-false}
      # Inbound DM agent: Pacto users get AI chat + commands (parity with Signal)
      - PACTO__AGENT_ENABLED=${PACTO_AGENT_ENABLED:-true}
      - PACTO__SOCKET_PATH=/var/run/pacto/pacto-bot-api.sock
      - PACTO__BOT_ID=${PACTO_BOT_ID:-sigstack}
      - PACTO__DEFAULT_RECIPIENT=${PACTO_DEFAULT_RECIPIENT:-}
      # Pactoâ†’Signal relay (!signal): off by default, allowlist-gated
      - PACTO__SIGNAL_RELAY_ENABLED=${PACTO_SIGNAL_RELAY_ENABLED:-false}
      - PACTO__SIGNAL_RELAY_ALLOWLIST=${PACTO_SIGNAL_RELAY_ALLOWLIST:-}
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock:ro
      - group-prefs-data:/data
      - pacto-data:/var/run/pacto
    networks:
      - internal
    depends_on:
      signal-api:
        condition: service_healthy
      whisper-api:
        condition: service_healthy
    restart: unless-stopped

  whisper-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.whisper
    platform: linux/amd64
    container_name: whisper-api
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-small}
    volumes:
      - whisper-models:/models
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    restart: unless-stopped

  # Pacto messaging daemon (https://github.com/covenant-gov/pacto-bot-api).
  # Opt-in: enable with `docker compose --profile pacto up -d` after copying
  # pacto-bot-api.toml.example to pacto-bot-api.toml and setting PACTO_BOT_NSEC
  # (plus PACTO_ENABLED=true on signal-bot).
  pacto-bot-api:
    build:
      # Pinned to a release tag; bump deliberately.
      context: https://github.com/covenant-gov/pacto-bot-api.git#v0.6.0
    container_name: pacto-bot-api
    profiles: ["pacto"]
    environment:
      - PACTO_BOT_NSEC=${PACTO_BOT_NSEC}
      - RUST_LOG=${LOG_LEVEL:-info}
    volumes:
      - ./pacto-bot-api.toml:/etc/pacto/pacto-bot-api.toml:ro
      # Shared with signal-bot: the daemon's Unix socket lives in this volume
      - pacto-data:/var/lib/pacto-bot-api
    networks:
      - internal
    restart: unless-stopped

  signal-registration-proxy:
    build:
      context: ..
      dockerfile: docker/Dockerfile.proxy
    container_name: signal-registration-proxy
    environment:
      - SIGNAL__API_URL=http://signal-api:8080
      - REGISTRY__PATH=/data/registry.enc
      - SERVER__LISTEN_ADDR=0.0.0.0
      - SERVER__PORT=8081
      - DSTACK__SOCKET_PATH=/var/run/dstack.sock
      - RATE_LIMIT__GLOBAL_PER_MINUTE=${RATE_LIMIT_GLOBAL_PER_MINUTE:-10}
      - RATE_LIMIT__PER_NUMBER_PER_HOUR=${RATE_LIMIT_PER_NUMBER_PER_HOUR:-3}
      - LOG__LEVEL=${LOG_LEVEL:-info}
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock:ro
      - registry-data:/data
    ports:
      # Expose registration API externally (for multi-tenant self-service)
      - "8081:8081"
    networks:
      - internal
    depends_on:
      signal-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  signal-config:
    driver: local
  registry-data:
    driver: local
  whisper-models:
    driver: local
  group-prefs-data:
    driver: local
  pacto-data:
    driver: local

networks:
  internal:
    # Internal network - no external access to signal-api
    name: signal-bot-internal
